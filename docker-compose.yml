services:
  database:
    container_name: oph-koodisto-db
    image: postgres:15.15@sha256:98fe06b500b5eb29e45bf8c073eb0ca399790ce17b1d586448edc4203627d342
    environment:
      - POSTGRES_USER=app
      - POSTGRES_DB=koodisto
      - POSTGRES_PASSWORD=koodisto
    ports:
      - 5454:5432
    command: ["postgres", "-c", "log_statement=all"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username app --dbname koodisto"]
      interval: 1s
  database-test:
    container_name: oph-koodisto-test-db
    image: postgres:15.15@sha256:98fe06b500b5eb29e45bf8c073eb0ca399790ce17b1d586448edc4203627d342
    environment:
      - POSTGRES_USER=app
      - POSTGRES_DB=koodisto
      - POSTGRES_PASSWORD=koodisto
    ports:
      - 5453:5432
    command: ["postgres", "-c", "log_statement=all"]
volumes:
  database-data:
